name: auth0/jwks-rsa-java/build-and-test

on:
  pull_request:
  merge_group:
  push:
    branches: ["master", "main"]

jobs:
  gradle:
    runs-on:  ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 8

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Test and Assemble and ApiDiff with Gradle
        run: ./gradlew assemble apiDiff check jacocoTestReport --continue --console=plain

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          flags: unittests
      - uses: actions/upload-artifact@v7
        with:
          name: Reports
          path: lib/build/reports
